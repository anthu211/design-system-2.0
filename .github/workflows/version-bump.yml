name: Bump Version

on:
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  bump:
    # Skip if this commit is already a version bump (prevents infinite loop)
    if: "!startsWith(github.event.head_commit.message, 'chore: bump version')"
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Bump patch version in index.html
        run: |
          CURRENT=$(grep -o 'v[0-9]\+\.[0-9]\+\.[0-9]\+' index.html | head -1)
          if [ -z "$CURRENT" ]; then
            echo "No version tag found — skipping."
            exit 0
          fi
          MAJOR=$(echo "$CURRENT" | sed 's/v//' | cut -d. -f1)
          MINOR=$(echo "$CURRENT" | sed 's/v//' | cut -d. -f2)
          PATCH=$(echo "$CURRENT" | sed 's/v//' | cut -d. -f3)
          NEW_VERSION="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          sed -i "s/${CURRENT}/${NEW_VERSION}/g" index.html
          echo "Bumped: ${CURRENT} → ${NEW_VERSION}"

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html
          git commit -m "chore: bump version to ${NEW_VERSION}"
          git push
